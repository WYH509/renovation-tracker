databases:
  - name: renovation-tracker-db
    plan: free
    region: singapore

services:
  - type: web
    name: renovation-tracker
    env: node
    plan: free
    region: singapore
    buildCommand: npm ci --prefer-offline && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: renovation-tracker-db
          property: connectionString